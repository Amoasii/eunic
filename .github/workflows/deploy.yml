name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Build site
        run: |
          mkdir _site
          cp sites/dark/index.html sites/dark/script.js sites/dark/style.css _site/
          cp -r sites/images _site/images
          sed -i 's|\.\./images/|images/|g' _site/index.html _site/style.css
          mkdir _site/light
          cp sites/light/index.html sites/light/script.js sites/light/style.css _site/light/
          echo 'eunic.md' > _site/CNAME

      - uses: actions/upload-pages-artifact@v3

      - id: deployment
        uses: actions/deploy-pages@v4
