name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Build site
        run: |
          mkdir _site
          cp site/index.html site/script.js site/style.css _site/
          cp -r "sites example/images" _site/images
          sed -i 's|\.\./sites example/images/|images/|g' _site/index.html _site/style.css
          echo 'eunic.md' > _site/CNAME

      - uses: actions/upload-pages-artifact@v3

      - id: deployment
        uses: actions/deploy-pages@v4
